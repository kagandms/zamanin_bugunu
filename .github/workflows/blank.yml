name: Gunluk Tweet Botu

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6,10,14,18 * * *'

permissions:
  contents: write

jobs:
  calistir:
    runs-on: ubuntu-latest
    steps:
      - name: Depoyu Cek
        uses: actions/checkout@v3

      - name: Python Kur
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Kutuphaneleri Yukle
        run: pip install -r requirements.txt

      - name: Botu Calistir
        env:
          API_KEY: ${{ secrets.API_KEY }}
          API_SECRET: ${{ secrets.API_SECRET }}
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          ACCESS_TOKEN_SECRET: ${{ secrets.ACCESS_TOKEN_SECRET }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          # Veritabanı URL'i (Env üzerinden ezmek istersek)
          DATABASE_URL: "sqlite+aiosqlite:///bot_data.db"
        run: python -m src.main

      - name: Degisiklikleri Kaydet
        run: |
          git config --global user.name 'TarihBot Otomasyon'
          git config --global user.email 'bot@noreply.github.com'
          git add bot_data.db || true
          git commit -m "chore: update bot state (database)" || true
          git push

